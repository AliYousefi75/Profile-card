<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css">
    <title>User Profile Card</title>
</head>
<body>
    <div class="container">
        <!-- first card -->
        <div class="card dark">
            <div class="header">
                <span><i class="ri-arrow-left-line"></i></span>
                <span>
                    <i class="ri-heart-3-line"></i>
                    <i class="ri-more-2-fill"></i>
                </span>
            </div>
            <img src="./assets/user.jpg" alt="user">
            <h1 class="name">Beverly Little</h1>
            <p class="position">SENIOR FASHION DESIGNER</p>
            <p class="info">Create usable interface and designs @GraficSpark</p>
            <button>Hire Me</button>
            <div class="social-group">
                <div class="icon-card">
                    <div class="icon">
                    <i class="ri-dribbble-fill"></i>
                    </div>
                    <h4>12.8k</h4>
                    <p>Followers</p>
                </div>
                <div class="icon_card">
                    <div class="icon">
                        <i class="ri-behance-line"></i>
                    </div>
                    <h4>10.5k</h4>
                    <p>Followers</p>
                </div>
                <div class="icon_card">
                    <div class="icon">
                        <i class="ri-pinterest-line"></i>
                    </div>
                    <h4>8.2k</h4>
                    <p>Followers</p>
                </div>
            </div>
        </div>
        <!-- second card -->
        <div class="card ">
            <div class="header">
                <span><i class="ri-arrow-left-line"></i></span>
                <span>
                    <i class="ri-heart-3-line"></i>

                </span>
            </div>
            <img src="./assets/user.jpg" alt="user">
            <h1>Beverly Little</h1>
            <p class="position">SENIOR FASHION DESIGNER</p>
            <p class="info">Create usable interface and designs @GraficSpark</p>
            <button>Hire Me</button>
            <div class="social-group">
                <div class="icon-card">
                    <div class="icon">
                    <i class="ri-dribbble-fill"></i>
                    </div>
                    <h4>12.8k</h4>
                    <p>Followers</p>
                </div>
                <div class="icon_card">
                    <div class="icon">
                        <i class="ri-behance-line"></i>
                    </div>
                    <h4>10.5k</h4>
                    <p>Followers</p>
                </div>
                <div class="icon_card">
                    <div class="icon">
                        <i class="ri-pinterest-line"></i>
                    </div>
                    <h4>8.2k</h4>
                    <p>Followers</p>
                </div>
            </div>
        </div>
    </div>
        
    
</body>
</html>
